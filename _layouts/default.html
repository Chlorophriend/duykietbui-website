<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
    <meta name="author" content="{{ site.title }}" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}" />
    <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
    <meta property="og:url" content="{{ page.url | absolute_url }}" />
    <meta property="og:image" content="{{ '/images/avatar.jpg' | absolute_url }}" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}" />
    <meta property="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
    <link rel="icon" type="image/png" href="{{ '/images/logo.png' | relative_url }}">

    <!-- Inline script to prevent theme flashing on load -->
    <script>
        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (savedTheme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</head>
<body>

    <div id="wrapper">

        <header id="header">
            <a href="{{ '/' | relative_url }}" class="logo">{{ site.title }}</a>
        </header>

        <nav id="nav">
            <button id="nav-toggle" aria-expanded="false" aria-label="Toggle navigation">
                &#9776;
            </button>

            <ul class="links">
                <li class="{% if page.url == '/' %}active{% endif %}">
                    <a href="{{ '/' | relative_url }}">My Portfolio</a>
                </li>
                <li class="{% if page.url contains '/about/' %}active{% endif %}">
                    <a href="{{ '/about/' | relative_url }}">About</a>
                </li>
                <li class="{% if page.url contains '/blog/' %}active{% endif %}">
                    <a href="{{ '/blog/' | relative_url }}">Secret Blog</a>
                </li>
            </ul>

            <div class="actions-container">
                <ul class="icons">
                    <li>
                        <a href="https://www.linkedin.com/in/kiet-bui-84953b254/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
                            LinkedIn
                        </a>
                    </li>
                    <li>
                        <a href="https://github.com/Chlorophriend" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
                            GitHub
                        </a>
                    </li>
                </ul>
                <button id="theme-toggle" aria-label="Switch theme">☀️</button>
            </div>
        </nav>

        <main id="main">
            {{ content }}
        </main>

        <footer id="footer">
            <div class="copyright">
                <p>&copy; {{ "now" | date: "%Y" }} {{ site.title }}. All rights reserved.</p>
                <p>Designed with care for a modern footprint.</p>
            </div>
        </footer>

    </div>

    <!-- Main JS script -->
    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>

</body>
</html>
