---
layout: default
---
<article class="post-detail-container">
    <header class="post-header">
        <h1>{{ page.title }}</h1>
        {% if page.description %}
        <p class="description">{{ page.description }}</p>
        {% endif %}
    </header>
    
    {% if page.image %}
    <div class="post-image-main">
        <img src="{{ page.image | relative_url }}" alt="{{ page.title }}" />
    </div>
    {% endif %}

    <div class="post-content-body">
        {{ content }}
    </div>
</article>
